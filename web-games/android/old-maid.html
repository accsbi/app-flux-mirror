<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <!-- Android 専用入口（app-flux の android_index_* 準拠）。WEB 版(../old-maid.html)とは別フォルダ・別ファイル。
         差分: __ANDROID_APP__ を head で立てる／モバイル UX 用 CSS／title。
         本体は同じ <old-maid-standalone-app> / main.old-maid.ts（ゲーム/メニュー/多言語は web 単一ソース）。 -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no, interactive-widget=resizes-visual" />
    <link
      rel="icon"
      href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='8' fill='%230d1215'/%3E%3Ccircle cx='16' cy='16' r='9' fill='%23d4af37'/%3E%3C/svg%3E"
    />
    <title>Classic Simple Old Maid - Android</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body {
        width: 100%; height: 100%; overflow: hidden; background: #0d1215;
        -webkit-user-select: none; user-select: none;
        -webkit-touch-callout: none; -webkit-tap-highlight-color: transparent;
      }
      /* ステータスバー(時計)/ナビバー/ノッチと重ならないよう safe-area を body padding に。
         applyStageScale が body の padding を読んでステージを inset/オフセットする（app-flux sakuraslot 同方式）。
         flutter_inappwebview の WebView は SafeArea を無視して全画面描画するため、web 側で吸収する。 */
      body {
        position: fixed; inset: 0; overscroll-behavior-y: contain;
        /* env() が WebView で 0 になる場合に備え、Flutter が注入する --fb-* と max を取る（確実）。 */
        padding-top: max(env(safe-area-inset-top), var(--fb-top, 0px));
        padding-right: max(env(safe-area-inset-right), var(--fb-right, 0px));
        padding-bottom: max(env(safe-area-inset-bottom), var(--fb-bottom, 0px));
        padding-left: max(env(safe-area-inset-left), var(--fb-left, 0px));
      }
    </style>
    <script>
      window.__ANDROID_APP__ = true;
    </script>
  </head>
  <body>
    <old-maid-standalone-app></old-maid-standalone-app>
    <script type="module" src="../src/main.old-maid.ts"></script>
  </body>
</html>
