<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Browser Games — Classic Card Games Collection</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;700&family=Noto+Serif+JP:wght@500;600;700&display=swap"
    />
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      :root {
        --canvas: #ece3d0; --canvas-dark: #e2d6bd;
        --surface: #fbf4e4; --surface-dark: #efe2c9;
        --ink: #142a4a; --gold: #c9a24a; --gold-deep: #9c7a2e; --gold-bright: #e6c87d;
        --display: 'Cinzel', 'Noto Serif JP', 'Hiragino Mincho ProN', serif;
        --sans: 'Noto Serif JP', 'Hiragino Mincho ProN', 'Times New Roman', serif;
      }
      body {
        min-height: 100vh;
        font-family: var(--sans);
        color: #241c12;
        background: linear-gradient(180deg, var(--canvas), var(--canvas-dark));
        padding: 32px 16px 64px;
      }
      .hub-head { max-width: 560px; margin: 0 auto 28px; text-align: center; }
      .hub-eyebrow {
        font-family: var(--display); text-transform: uppercase; letter-spacing: 0.18em;
        font-size: 0.72rem; font-weight: 700; color: var(--gold-deep);
      }
      .hub-h1 {
        font-family: var(--display); font-size: clamp(1.6rem, 5vw, 2.2rem);
        font-weight: 700; color: var(--ink); margin-top: 6px;
      }
      #hub-list { max-width: 560px; margin: 0 auto; display: flex; flex-direction: column; gap: 16px; }
      /* 各ゲーム: タイトル＋「Browser Game」リンク（金額縁のクラシックカード） */
      .hub-item {
        display: flex; flex-direction: column; gap: 10px; padding: 18px 20px;
        background: linear-gradient(180deg, var(--surface), var(--surface-dark));
        border: 1px solid var(--gold-deep); border-radius: 14px;
        box-shadow: 0 8px 18px rgba(38, 21, 8, 0.14),
          inset 0 0 0 3px var(--surface), inset 0 0 0 4px rgba(156, 122, 46, 0.5);
      }
      .hub-title { font-family: var(--display); font-size: 1.2rem; font-weight: 700; color: var(--ink); line-height: 1.3; }
      .hub-link {
        align-self: flex-start; text-decoration: none;
        font-family: var(--display); font-weight: 700; letter-spacing: 0.04em; font-size: 0.95rem;
        padding: 10px 22px; border-radius: 999px; border: 2px solid var(--gold-deep);
        color: #2e1a0d; background: linear-gradient(180deg, var(--gold-bright), var(--gold));
        transition: filter 0.15s ease, transform 0.15s ease;
      }
      .hub-link:hover { filter: brightness(1.06); transform: translateY(-1px); }
      .hub-empty { text-align: center; color: #6c5d46; }
    </style>
  </head>
  <body>
    <header class="hub-head">
      <p class="hub-eyebrow">Playing Cards</p>
      <h1 class="hub-h1">Browser Games</h1>
    </header>
    <!-- リストは CSV(catalog/games-list.csv) から動的生成（ハードコードしない） -->
    <main id="hub-list"><p class="hub-empty">…</p></main>
    <script type="module" src="./src/main.hub.ts"></script>
  </body>
</html>
