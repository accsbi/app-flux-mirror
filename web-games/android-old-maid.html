<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <!-- Android 用入口（app-flux の android_index_*.html 同様）。WEB 版(old-maid.html)とは別ファイル。
         WEB との差分: __ANDROID_APP__ を head で立てる／モバイル UX 用 CSS／タイトルに - Android。
         同じ <old-maid-standalone-app> / main.old-maid.ts を読む（ゲーム本体は web 単一ソース）。 -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no, interactive-widget=resizes-visual" />
    <title>Classic Simple Old Maid - Android</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body {
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #0d1215;
        -webkit-user-select: none;
        user-select: none;
        -webkit-touch-callout: none;
        -webkit-tap-highlight-color: transparent;
      }
      body { position: fixed; inset: 0; overscroll-behavior-y: contain; }
    </style>
    <script>
      window.__ANDROID_APP__ = true;
    </script>
  </head>
  <body>
    <old-maid-standalone-app></old-maid-standalone-app>
    <script type="module" src="./src/main.old-maid.ts"></script>
  </body>
</html>
