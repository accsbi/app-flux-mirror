<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Classic Card Games Collection</title>
    <!-- 既定言語 /en/ へリダイレクト。
         必ず絶対パス(/en/)にすること。相対(./en/)だと、index.html を SPA フォールバックで
         返す未知パス（例 /web-games/）から ./en/ → /web-games/en/ → /web-games/en/en/ … と
         「en」が無限に積まれるリダイレクトループになる（base:'/' 前提）。 -->
    <meta http-equiv="refresh" content="0; url=/en/" />
  </head>
  <body>
    <a href="/en/">Classic Card Games Collection</a>
  </body>
</html>
