<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Medieval Bet UI</title>

    <style>
        :root {
            --panel-dark: #10291c;
            --panel-middle: #173825;
            --panel-light: #234a32;

            --gold-light: #f5dc8a;
            --gold: #c89a3a;
            --gold-dark: #72501d;

            --button-top: #493525;
            --button-bottom: #251b14;

            --red-top: #7f2c24;
            --red-bottom: #431713;

            --blue-top: #24547e;
            --blue-bottom: #102c48;

            --gray-top: #45484a;
            --gray-bottom: #252729;

            --text-light: #f6e6b3;
            --shadow: rgba(0, 0, 0, 0.65);
        }

        * {
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            margin: 0;
            display: grid;
            place-items: center;
            padding: 24px;
            background:
                radial-gradient(circle at top, #172017 0%, #080d09 55%, #030504 100%);
            font-family: Georgia, "Times New Roman", serif;
        }

        button {
            font: inherit;
        }

        .bet-modal {
            position: relative;
            width: min(100%, 520px);
            padding: 72px 32px 34px;
            color: var(--text-light);

            background:
                linear-gradient(145deg,
                    rgba(255, 255, 255, 0.035),
                    transparent 35%),
                linear-gradient(180deg,
                    var(--panel-light),
                    var(--panel-dark));

            border: 3px solid var(--gold);
            border-radius: 22px;

            box-shadow:
                0 0 0 2px #35250f,
                0 0 0 5px var(--gold-dark),
                0 18px 40px var(--shadow),
                inset 0 0 28px rgba(0, 0, 0, 0.45),
                inset 0 1px 0 rgba(255, 255, 255, 0.16);
        }

        .bet-modal::before {
            content: "";
            position: absolute;
            top: -24px;
            left: 50%;
            width: 74%;
            height: 48px;
            transform: translateX(-50%);

            background: var(--panel-middle);
            border: 3px solid var(--gold);
            border-bottom: 0;
            border-radius: 50% 50% 0 0 / 90% 90% 0 0;

            box-shadow:
                0 -2px 0 #38270f,
                inset 0 6px 12px rgba(255, 255, 255, 0.035);
        }

        .bet-modal::after {
            content: "";
            position: absolute;
            inset: 12px;
            pointer-events: none;

            border: 1px solid rgba(229, 185, 85, 0.54);
            border-radius: 14px;

            box-shadow:
                inset 0 0 0 1px rgba(0, 0, 0, 0.35);
        }

        .bet-emblem {
            position: absolute;
            z-index: 2;
            top: -52px;
            left: 50%;
            width: 82px;
            height: 82px;
            transform: translateX(-50%);

            display: grid;
            place-items: center;

            color: var(--gold-light);
            font-size: 37px;
            line-height: 1;

            background:
                linear-gradient(145deg, #264c35, #0d2016);

            border: 4px solid var(--gold);
            border-radius: 18px 18px 28px 28px;

            box-shadow:
                0 0 0 2px #3d2b11,
                0 8px 15px rgba(0, 0, 0, 0.55),
                inset 0 0 12px rgba(0, 0, 0, 0.5);
        }

        .bet-header {
            position: relative;
            z-index: 1;
            display: grid;
            grid-template-columns: 1fr auto 1fr;
            align-items: center;
            gap: 16px;
            margin-bottom: 24px;
        }

        .bet-header h2 {
            margin: 0;
            color: var(--gold-light);
            font-size: clamp(25px, 6vw, 38px);
            font-weight: 700;
            letter-spacing: 0.055em;
            text-align: center;

            text-shadow:
                0 2px 0 #5e4015,
                0 4px 7px rgba(0, 0, 0, 0.65);
        }

        .header-line {
            position: relative;
            height: 1px;
            background: linear-gradient(90deg,
                    transparent,
                    var(--gold),
                    transparent);
        }

        .header-line::after {
            content: "";
            position: absolute;
            top: 50%;
            left: 50%;
            width: 8px;
            height: 8px;
            transform: translate(-50%, -50%) rotate(45deg);

            background: var(--panel-dark);
            border: 1px solid var(--gold);
        }

        .bet-display {
            position: relative;
            z-index: 1;
            min-height: 110px;
            margin-bottom: 22px;

            display: grid;
            place-items: center;

            color: var(--gold-light);
            font-size: 64px;
            font-weight: 700;

            background:
                linear-gradient(180deg,
                    #0a1810,
                    #102619);

            border: 3px solid var(--gold);
            border-radius: 15px;

            box-shadow:
                0 0 0 2px #3e2b10,
                inset 0 0 18px rgba(0, 0, 0, 0.7),
                inset 0 1px 0 rgba(255, 255, 255, 0.06),
                0 8px 12px rgba(0, 0, 0, 0.3);

            text-shadow:
                0 2px 0 #6d4b1b,
                0 4px 5px rgba(0, 0, 0, 0.65);
        }

        .number-grid,
        .limit-grid,
        .action-grid {
            position: relative;
            z-index: 1;
            display: grid;
            gap: 12px;
        }

        .number-grid {
            grid-template-columns: repeat(3, 1fr);
        }

        .limit-grid,
        .action-grid {
            grid-template-columns: repeat(2, 1fr);
            margin-top: 16px;
        }

        .key,
        .wide-key,
        .action-button {
            position: relative;
            min-width: 0;
            border: 2px solid var(--gold);
            color: var(--text-light);
            cursor: default;

            background:
                linear-gradient(180deg,
                    var(--button-top),
                    var(--button-bottom));

            box-shadow:
                0 0 0 1px #2f200d,
                0 6px 0 #120d09,
                0 9px 12px rgba(0, 0, 0, 0.34),
                inset 0 1px 0 rgba(255, 255, 255, 0.11),
                inset 0 -8px 14px rgba(0, 0, 0, 0.18);

            text-shadow:
                0 2px 0 #4c3515,
                0 3px 5px rgba(0, 0, 0, 0.75);

            transition:
                transform 120ms ease,
                filter 120ms ease;

            clip-path: polygon(8px 0,
                    calc(100% - 8px) 0,
                    100% 8px,
                    100% calc(100% - 8px),
                    calc(100% - 8px) 100%,
                    8px 100%,
                    0 calc(100% - 8px),
                    0 8px);
        }

        .key {
            min-height: 82px;
            font-size: 37px;
            font-weight: 700;
        }

        .wide-key {
            min-height: 74px;
            font-size: 25px;
            font-weight: 700;
            letter-spacing: 0.05em;

            background:
                linear-gradient(180deg,
                    #25462f,
                    #112c1d);
        }

        .wide-key span {
            margin: 0 12px;
        }

        .action-button {
            min-height: 78px;
            font-size: 25px;
            font-weight: 700;
            letter-spacing: 0.04em;
        }

        .key-clear,
        .cancel-button {
            background:
                linear-gradient(180deg,
                    var(--red-top),
                    var(--red-bottom));
        }

        .key-back {
            background:
                linear-gradient(180deg,
                    var(--gray-top),
                    var(--gray-bottom));
        }

        .ok-button {
            background:
                linear-gradient(180deg,
                    var(--blue-top),
                    var(--blue-bottom));
        }

        .key::before,
        .wide-key::before,
        .action-button::before {
            content: "";
            position: absolute;
            inset: 5px;
            pointer-events: none;

            border: 1px solid rgba(247, 218, 137, 0.29);

            clip-path: polygon(6px 0,
                    calc(100% - 6px) 0,
                    100% 6px,
                    100% calc(100% - 6px),
                    calc(100% - 6px) 100%,
                    6px 100%,
                    0 calc(100% - 6px),
                    0 6px);
        }

        .key:hover,
        .wide-key:hover,
        .action-button:hover {
            filter: brightness(1.1);
        }

        .key:active,
        .wide-key:active,
        .action-button:active {
            transform: translateY(4px);
            box-shadow:
                0 0 0 1px #2f200d,
                0 2px 0 #120d09,
                inset 0 3px 10px rgba(0, 0, 0, 0.28);
        }

        @media (max-width: 480px) {
            body {
                padding: 12px;
            }

            .bet-modal {
                padding: 64px 18px 24px;
                border-radius: 17px;
            }

            .bet-emblem {
                width: 68px;
                height: 68px;
                top: -43px;
                font-size: 30px;
            }

            .bet-header {
                gap: 9px;
            }

            .bet-header h2 {
                font-size: 27px;
            }

            .bet-display {
                min-height: 86px;
                font-size: 50px;
            }

            .number-grid,
            .limit-grid,
            .action-grid {
                gap: 9px;
            }

            .key {
                min-height: 66px;
                font-size: 29px;
            }

            .wide-key,
            .action-button {
                min-height: 62px;
                font-size: 19px;
            }

            .wide-key span {
                margin: 0 5px;
            }
        }
    </style>
</head>

<body>
    <div class="bet-modal">
        <div class="bet-emblem">♜</div>

        <div class="bet-header">
            <span class="header-line"></span>
            <h2>ENTER BET</h2>
            <span class="header-line"></span>
        </div>

        <div class="bet-display">1</div>

        <div class="number-grid">
            <button class="key" type="button">1</button>
            <button class="key" type="button">2</button>
            <button class="key" type="button">3</button>

            <button class="key" type="button">4</button>
            <button class="key" type="button">5</button>
            <button class="key" type="button">6</button>

            <button class="key" type="button">7</button>
            <button class="key" type="button">8</button>
            <button class="key" type="button">9</button>

            <button class="key key-clear" type="button">C</button>
            <button class="key" type="button">0</button>
            <button class="key key-back" type="button">←</button>
        </div>

        <div class="limit-grid">
            <button class="wide-key" type="button">♛ <span>MIN</span></button>
            <button class="wide-key" type="button"><span>MAX</span> ♛</button>
        </div>

        <div class="action-grid">
            <button class="action-button cancel-button" type="button">
                CANCEL
            </button>

            <button class="action-button ok-button" type="button">
                OK
            </button>
        </div>
    </div>
</body>

</html>
